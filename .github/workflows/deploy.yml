name: Deploy ke VPS

# Trigger: Jalan setiap ada push ke branch 'main'
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    # PENTING: Menjalankan pada server VPS kamu (bukan server GitHub)
    runs-on: self-hosted

    steps:
    # 1. Ambil kodingan terbaru dari GitHub
    - name: Ambil Kodingan (Checkout)
      uses: actions/checkout@v4

    # 2. Pindahkan file ke folder web server (Rsync)
    - name: Update File Project
      run: |
        echo "Sedang menyalin file..."
        # Flag --delete akan menghapus file di VPS jika file tersebut sudah dihapus di GitHub
        # Folder writable/uploads dan writable/session dikecualikan agar data pengguna tidak hilang
        rsync -av --delete --exclude='.git' --exclude='.env' --exclude='writable/uploads' --exclude='writable/session' ./ /home/github-runner/company-profile-medicom/

    # 3. Update Dependency & Database
    - name: Update Dependency & Migrate
      run: |
        cd /home/github-runner/company-profile-medicom
        
        # Menginstal atau memperbarui library PHP sesuai composer.lock
        composer install --no-dev --optimize-autoloader
        
        # Jalankan migrasi database otomatis
        php spark migrate --all

    # 4. Bersihkan Cache CI4
    - name: Clear Cache
      run: |
        cd /home/github-runner/company-profile-medicom
        php spark cache:clear

    # 5. Fix Permissions untuk Web Server (Nginx)
    - name: Set Folder Permissions
      run: |
        cd /home/github-runner/company-profile-medicom
        # Pastikan folder writable bisa diakses penuh oleh Nginx untuk menyimpan log, cache, dan session
        chmod -R 777 writable/